version: "3.8"

# ─────────────────────────────────────────────────────────────
#  Apache SkyWalking 完整监控栈
#
#  组件：
#    elasticsearch   - 数据存储（SkyWalking 的 backend storage）
#    oap             - SkyWalking OAP Server（接收 Agent 上报数据 + 分析）
#    skywalking-ui   - SkyWalking Web UI（可视化界面，访问 http://localhost:8088）
# ─────────────────────────────────────────────────────────────

services:

  elasticsearch:
    image: elasticsearch:7.17.18
    container_name: skywalking-es
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - skywalking-net

  oap:
    image: apache/skywalking-oap-server:9.7.0
    container_name: skywalking-oap
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      SW_STORAGE: elasticsearch
      SW_STORAGE_ES_CLUSTER_NODES: elasticsearch:9200
      SW_CORE_REST_PORT: 12800
      SW_CORE_GRPC_PORT: 11800
      # 保留数据天数
      SW_CORE_RECORD_DATA_TTL: 7
      SW_CORE_METRICS_DATA_TTL: 7
    ports:
      - "11800:11800"   # gRPC 端口，Java Agent 默认上报到此端口
      - "12800:12800"   # HTTP REST 端口
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:12800/internal/l7check || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - skywalking-net

  skywalking-ui:
    image: apache/skywalking-ui:9.7.0
    container_name: skywalking-ui
    depends_on:
      oap:
        condition: service_healthy
    environment:
      SW_OAP_ADDRESS: http://oap:12800
    ports:
      - "8088:8080"   # 浏览器访问 http://localhost:8088
    networks:
      - skywalking-net

volumes:
  es-data:
    driver: local

networks:
  skywalking-net:
    driver: bridge

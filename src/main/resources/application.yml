spring:
  application:
    name: demo
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

demo:
  fair-scheduling:
    enabled: false   # 单机版 WFQ 演示开关，true 时启动自动运行
  cluster-fair-scheduling:
    enabled: false   # 集群版 WFQ 演示开关，true 时启动自动运行（需 Redis）
  transfer:
    test-initializer:
      enabled: false  # 转账模块 AccountController API 集成测试开关，true 时启动自动运行
  payment:
    test-initializer:
      enabled: false  # 支付模块 API 集成测试开关，true 时启动自动运行
  hive-sync:
    enabled: false    # Hive 定时批量同步开关，true 时激活（需配置 MySQL 和 Hive 连接）
    run-on-startup: false  # true 时启动后立即触发一次全量同步（用于调试）
    incremental-sync-cron: "0 0 * * * *"   # 增量同步：每小时整点
    full-sync-cron: "0 0 1 * * *"          # 全量同步：每天凌晨 1 点
    mysql:
      url: jdbc:mysql://localhost:3306/order_db?useSSL=false&serverTimezone=Asia/Shanghai
      username: root
      password: root
      driver-class-name: com.mysql.cj.jdbc.Driver
    hive:
      url: jdbc:hive2://localhost:10000/default
      username: hive
      password: ""
      driver-class-name: org.apache.hive.jdbc.HiveDriver
  merchandise-search:
    enabled: false    # 商品搜索（Elasticsearch 演示）开关，true 时启动自动建索引并写样例数据
    es-base-url: http://localhost:9200
    index-name: products
    analyzer: standard         # 生产建议 ik_max_word（需安装 IK 插件）
    search-analyzer: standard  # 生产建议 ik_smart
    seed-on-startup: false
    number-of-shards: 3
    number-of-replicas: 0
  pay-stock:
    enabled: false    # 支付扣库存（本地消息表+RocketMQ）开关
    mysql:
      url: jdbc:mysql://localhost:3306/pay_stock_db?useSSL=false&serverTimezone=Asia/Shanghai
      username: root
      password: root
      driver-class-name: com.mysql.cj.jdbc.Driver

rocketmq:
  name-server: localhost:9876
  producer:
    group: pay-stock-producer-group
